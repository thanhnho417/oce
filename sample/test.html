    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="test.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = new Plyr('#player');

            const vidElements = document.querySelectorAll('.video-list .vid');
            vidElements.forEach((vid) => {
                vid.addEventListener('click', () => {
                    const videoElement = vid.querySelector('video');
                    const videoSource = videoElement.getAttribute('src');
                    const videoTitle = vid.querySelector('.title').textContent;

                    // Kiểm tra định dạng video
                    let videoType = 'video/mp4'; // Mặc định là mp4
                    if (videoSource.endsWith('.m3u8')) {
                        videoType = 'application/x-mpegURL';
                    }

                    // Cập nhật nguồn phát
                    player.source = {
                        type: 'video',
                        sources: [
                            {
                                src: videoSource,
                                type: videoType,
                            },
                        ],
                    };

                    // Cập nhật tiêu đề
                    document.querySelector('.main-video .title').textContent = videoTitle;

                    // Phát video
                    player.play();
                });
            });
        });
    </script>
</body>
</html>
